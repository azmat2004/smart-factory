# Nginx 反向代理配置
# 将此文件复制到 /etc/nginx/conf.d/smart-factory.conf

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名

    # 日志
    access_log /var/log/nginx/smart-factory-access.log;
    error_log  /var/log/nginx/smart-factory-error.log;

    # 上传文件大小限制
    client_max_body_size 10M;

    # 静态文件直接由 Nginx 提供服务
    location /uploads/ {
        alias /opt/smart-factory/public/uploads/;
        expires 30d;
    }
    location /css/ {
        alias /opt/smart-factory/public/css/;
        expires 7d;
    }
    location /js/ {
        alias /opt/smart-factory/public/js/;
        expires 7d;
    }

    # API 请求转发到 Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

